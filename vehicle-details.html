<body class="vehicle-details-page">
    <site-navbar></site-navbar>

    <main class="vehicle-details-main">
        <section class="vehicle-title-bar">
            <div class="vehicle-title-row">
                <div class="vehicle-title-wrap">
                    <h1 id="detailTitle"></h1>
                    <p id="detailMeta"></p>
                </div>
            </div>
        </section>

        <section class="vehicle-details-shell">
            <div class="details-top">
                <div class="details-left">
                    <div class="main-img-container">
                        <button class="nav-btn prev">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="15 18 9 12 15 6"></polyline>
                            </svg>
                        </button>
                        <img id="detailImage" src="" alt="Vehiculo" />
                        <button class="nav-btn next">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="9 18 15 12 9 6"></polyline>
                            </svg>
                        </button>
                    </div>
                    <div class="thumbs-wrap">
                        <button id="thumbsPrev" class="thumbs-nav prev" type="button" aria-label="Fotos anteriores">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="15 18 9 12 15 6"></polyline>
                            </svg>
                        </button>
                        <div id="thumbsTrack" class="thumbs-track" aria-label="Miniaturas del vehiculo"></div>
                        <button id="thumbsNext" class="thumbs-nav next" type="button" aria-label="Siguientes fotos">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="9 18 15 12 9 6"></polyline>
                            </svg>
                        </button>
                    </div>
                    <a href="pre-approved.html" class="btn-preapproval" data-i18n="vehicle.preApproval">Pre-Approval</a>
                </div>

                <aside class="details-right">
                    <div class="price-badge price-panel">
                        <article class="price-card cash-card">
                            <div class="cash-left">
                                <div class="tag-icon" aria-hidden="true">
                                    <svg viewBox="0 0 24 24">
                                        <path
                                            d="M21 10.5 13.5 3H6a2 2 0 0 0-2 2v7.5l7.5 7.5a2.12 2.12 0 0 0 3 0l6.5-6.5a2.12 2.12 0 0 0 0-3ZM8.5 9A1.5 1.5 0 1 1 10 7.5 1.5 1.5 0 0 1 8.5 9Z" />
                                    </svg>
                                </div>
                                <h2 id="detailCash" class="cash-price"></h2>
                            </div>
                            <div class="cash-right">
                                <span id="detailCashLine1" class="small">Cash</span>
                                <span id="detailCashLine2" class="small">Price</span>
                            </div>
                        </article>
                        <div id="detailFinanceBox" class="finance-wrap" hidden>
                            <div class="price-divider">OR</div>
                            <article class="price-card finance-card">
                                <div class="finance-top">
                                    <h2 id="detailFinanced" class="finance-price"></h2>
                                    <div id="detailFinancedLabel" class="finance-label">Financed</div>
                                </div>
                                <div id="detailFinanceBottom" class="finance-bottom">
                                    <span id="detailOnly" class="only">only</span>
                                    <span id="detailDownPrice" class="down-price"></span>
                                    <span id="detailDown" class="down-text"></span>
                                </div>
                            </article>
                        </div>
                    </div>
                    <div class="specs-box">
                        <h2 data-i18n="vehicle.features">Features</h2>
                        <div id="detailSpecsGrid" class="detail-specs-grid"></div>
                    </div>

                    <div class="highlights-box">
                        <h3 data-i18n="vehicle.highlights">Highlights</h3>
                        <div id="detailHighlights" class="highlight-tags"></div>
                    </div>
                </aside>
            </div>
        </section>

        <section class="similar-vehicles-wrapper">
            <div class="similar-inner">
                <div class="similar-header">
                    <h2 data-i18n="vehicle.similarVehicles">SIMILAR VEHICLES</h2>
                    <div class="divider">
                        <span></span>
                        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                            <path
                                d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z">
                            </path>
                        </svg>
                        <span></span>
                    </div>
                </div>
                <div id="similarGrid" class="similar-grid"></div>
            </div>
        </section>
    </main>
