<body class="preapprove-page">
    <site-navbar></site-navbar>

    <main class="preapprove-main">
        <section class="preapprove-shell">
            <h1 data-i18n="preapprove.title">PRE APPROVAL / APPLY HERE</h1>

            <form id="preapproveForm" class="preapprove-form" novalidate>
                <fieldset>
                    <legend data-i18n="preapprove.personalTitle">Personal Information</legend>
                    <div class="form-grid form-grid-4">
                        <label class="form-field">
                            <span data-i18n="preapprove.firstName">First Name</span>
                            <input type="text" name="firstName" required />
                        </label>
                        <label class="form-field">
                            <span data-i18n="preapprove.middleName">Middle Name</span>
                            <input type="text" name="middleName" required />
                        </label>
                        <label class="form-field">
                            <span data-i18n="preapprove.lastName">Last Name</span>
                            <input type="text" name="lastName" required />
                        </label>
                        <label class="form-field">
                            <span data-i18n="preapprove.ssn">SSN/ITIN</span>
                            <input id="ssnInput" type="text" name="ssn" />
                        </label>

                        <label class="form-check form-check-inline">
                            <input id="noSsn" type="checkbox" name="noSsn" />
                            <span data-i18n="preapprove.noSsn">No SSN / ITIN</span>
                        </label>

                        <label class="form-field">
                            <span data-i18n="preapprove.dob">Date of Birth</span>
                            <input type="date" name="birthDate" required />
                        </label>
                        <label class="form-field">
                            <span data-i18n="preapprove.idType">ID Type</span>
                            <select name="idType" required>
                                <option value="" data-i18n="preapprove.idOptionDefault">Select</option>
                                <option value="license" data-i18n="preapprove.idOptionLicense">US Driver's License
                                </option>
                                <option value="passport" data-i18n="preapprove.idOptionPassport">US Passport</option>
                                <option value="idcard" data-i18n="preapprove.idOptionCard">US ID Card</option>
                                <option value="foreign" data-i18n="preapprove.idOptionForeign">Foreign ID</option>
                            </select>
                        </label>
                        <label class="form-field">
                            <span data-i18n="preapprove.idState">ID State</span>
                            <input type="text" name="idState" required />
                        </label>
                        <label class="form-field">
                            <span data-i18n="preapprove.idNumber">ID Number</span>
                            <input type="text" name="idNumber" required />
                        </label>
                        <p class="form-help" data-i18n="preapprove.idHelp">Foreign ID can include Passport, Consular ID,
                            or employment authorization.</p>

                        <label class="form-field form-span-2">
                            <span data-i18n="preapprove.street">Street</span>
                            <input type="text" name="street" required />
                        </label>
                        <label class="form-field">
                            <span data-i18n="preapprove.city">City</span>
                            <input type="text" name="city" required />
                        </label>
                        <label class="form-field">
                            <span data-i18n="preapprove.state">State</span>
                            <input type="text" name="state" required />
                        </label>
                        <label class="form-field">
                            <span data-i18n="preapprove.zip">Zip</span>
                            <input type="text" name="zip" required />
                        </label>
                    </div>
                </fieldset>

                <fieldset>
                    <legend data-i18n="preapprove.residenceTitle">Residence Information</legend>
                    <div class="form-grid form-grid-3">
                        <label class="form-field">
                            <span data-i18n="preapprove.residenceType">Residence Type</span>
                            <select name="residenceType" required>
                                <option value="" data-i18n="preapprove.residenceOptionDefault">Select</option>
                                <option value="rent" data-i18n="preapprove.residenceOptionRent">Rent</option>
                                <option value="own" data-i18n="preapprove.residenceOptionOwn">Own Outright</option>
                                <option value="other" data-i18n="preapprove.residenceOptionOther">Other</option>
                                <option value="mortgage" data-i18n="preapprove.residenceOptionMortgage">Mortgage
                                </option>
                                <option value="family" data-i18n="preapprove.residenceOptionFamily">Family</option>
                                <option value="military" data-i18n="preapprove.residenceOptionMilitary">Military
                                </option>
                            </select>
                        </label>
                        <label class="form-field">
                            <span data-i18n="preapprove.rentMortgage">Rent/Mortgage</span>
                            <input type="number" name="rentMortgage" min="0" step="1" required />
                        </label>
                        <div class="length-row">
                            <span data-i18n="preapprove.lengthAtAddress">Length At Address</span>
                            <div class="length-fields">
                                <label class="form-field">
                                    <input type="number" name="addressYears" min="0" step="1" required
                                        placeholder="years" data-i18n-placeholder="preapprove.years" aria-label="years"
                                        data-i18n-aria-label="preapprove.years" />
                                </label>
                                <label class="form-field">
                                    <input type="number" name="addressMonths" min="0" max="11" step="1" required
                                        placeholder="months" data-i18n-placeholder="preapprove.months"
                                        aria-label="months" data-i18n-aria-label="preapprove.months" />
                                </label>
                            </div>
                        </div>
                    </div>
                </fieldset>

                <fieldset>
                    <legend data-i18n="preapprove.employmentTitle">Employment Information</legend>
                    <div class="form-grid form-grid-4">
                        <label class="form-field form-span-2">
                            <span data-i18n="preapprove.employmentType">Employment Type</span>
                            <select name="employmentType" required>
                                <option value="" data-i18n="preapprove.employmentOptionDefault">Select</option>
                                <option value="full" data-i18n="preapprove.employmentOptionFull">Employed - FullTime
                                </option>
                                <option value="part" data-i18n="preapprove.employmentOptionPart">Employed - PartTime
                                </option>
                                <option value="seasonal" data-i18n="preapprove.employmentOptionTemp">Temporary/Seasonal
                                </option>
                                <option value="military" data-i18n="preapprove.employmentOptionMilitary">Active Military
                                </option>
                                <option value="retired" data-i18n="preapprove.employmentOptionRetired">SSI/Retired
                                </option>
                                <option value="self" data-i18n="preapprove.employmentOptionSelf">Self Employed</option>
                                <option value="unemployed" data-i18n="preapprove.employmentOptionUnemployed">Unemployed
                                </option>
                            </select>
                        </label>
                        <label class="form-field">
                            <span data-i18n="preapprove.employerName">Employer Name</span>
                            <input type="text" name="employerName" required />
                        </label>
                        <label class="form-field">
                            <span data-i18n="preapprove.employerPhone">Employer Phone</span>
                            <input type="tel" name="employerPhone" required />
                        </label>
                        <div class="length-row form-span-2">
                            <span data-i18n="preapprove.lengthAtJob">Length At Job</span>
                            <div class="length-fields">
                                <label class="form-field">
                                    <input type="number" name="jobYears" min="0" step="1" placeholder="years"
                                        data-i18n-placeholder="preapprove.years" aria-label="years"
                                        data-i18n-aria-label="preapprove.years" required />
                                </label>
                                <label class="form-field">
                                    <input type="number" name="jobMonths" min="0" max="11" step="1" placeholder="months"
                                        data-i18n-placeholder="preapprove.months" aria-label="months"
                                        data-i18n-aria-label="preapprove.months" required />
                                </label>
                            </div>
                        </div>
                    </div>
                </fieldset>

                <fieldset>
                    <legend data-i18n="preapprove.incomeTitle">Income Information</legend>
                    <div class="form-grid form-grid-2">
                        <label class="form-field">
                            <span data-i18n="preapprove.incomeType">Income Type</span>
                            <select name="incomeType" required>
                                <option value="" data-i18n="preapprove.incomeOptionDefault">Select</option>
                                <option value="w2" data-i18n="preapprove.incomeOptionW2">W2</option>
                                <option value="self" data-i18n="preapprove.incomeOptionSelf">Self Employed</option>
                                <option value="business" data-i18n="preapprove.incomeOptionBusiness">Self Employed
                                    Business</option>
                                <option value="turbo" data-i18n="preapprove.incomeOptionTurbo">Turbo Pass</option>
                                <option value="fixed" data-i18n="preapprove.incomeOptionFixed">Fixed Income</option>
                                <option value="cash" data-i18n="preapprove.incomeOptionCash">Cash Income</option>
                                <option value="military" data-i18n="preapprove.incomeOptionMilitary">Military</option>
                            </select>
                        </label>
                        <label class="form-field">
                            <span data-i18n="preapprove.monthlyIncome">Monthly Income</span>
                            <input type="number" name="monthlyIncome" min="0" step="1" required />
                        </label>
                    </div>
                </fieldset>

                <label class="form-check confirm-row">
                    <input type="checkbox" id="confirmCredit" required />
                    <span data-i18n="preapprove.confirm">Confirm all above is correct and acknowledge you have signed
                        credit app</span>
                </label>

                <div class="preapprove-actions">
                    <button type="submit" class="preapprove-submit" data-i18n="preapprove.submit">Submit
                        Application</button>
                    <p id="preapproveStatus" class="preapprove-status" hidden></p>
                </div>
            </form>
        </section>
    </main>

    <site-footer></site-footer>

    <script src="i18n.js"></script>
    <script type="module" src="components/site-navbar.js"></script>
    <script type="module" src="components/site-footer.js"></script>

    <script src="email-config.js"></script>
    <script src="pre-approved.js"></script>
</body>

</html>
