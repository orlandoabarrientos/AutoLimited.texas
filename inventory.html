<body class="inventory-page bg-surface font-body text-on-surface antialiased">
  <site-navbar></site-navbar>
  <main class="inventory-layout max-w-[1440px] mx-auto px-6 md:px-12 pb-16 flex flex-col md:flex-row gap-12">
    <aside class="inventory-sidebar w-full md:w-[300px] md:min-w-[300px]">
      <div class="inventory-filters">
        <h2 data-i18n="inventory.refineSearch">REFINE YOUR SEARCH</h2>

        <div class="filter-block filter-block-search">
          <label class="filter-label" for="searchText" data-i18n="inventory.searchLabel">Search</label>
          <input id="searchText" type="text" placeholder="Search by text"
            data-i18n-placeholder="inventory.searchPlaceholder" />
        </div>

        <div class="filter-block">
          <button class="filter-head" type="button">
            <span data-i18n="inventory.filterMake">Make</span>
            <span class="material-symbols-outlined" aria-hidden="true">expand_more</span>
          </button>
          <div class="filter-body">
            <label class="filter-option"><input class="filter-check" data-filter="make" value="International"
                type="checkbox" /><span>International</span></label>
            <label class="filter-option"><input class="filter-check" data-filter="make" value="Honda"
                type="checkbox" /><span>Honda</span></label>
            <label class="filter-option"><input class="filter-check" data-filter="make" value="Chevrolet"
                type="checkbox" /><span>Chevrolet</span></label>
            <label class="filter-option"><input class="filter-check" data-filter="make" value="Dodge"
                type="checkbox" /><span>Dodge</span></label>
            <label class="filter-option"><input class="filter-check" data-filter="make" value="Toyota"
                type="checkbox" /><span>Toyota</span></label>
            <label class="filter-option"><input class="filter-check" data-filter="make" value="Ford"
                type="checkbox" /><span>Ford</span></label>
            <label class="filter-option"><input class="filter-check" data-filter="make" value="Kia"
                type="checkbox" /><span>Kia</span></label>
          </div>
        </div>

        <div class="filter-block">
          <button class="filter-head" type="button">
            <span data-i18n="inventory.filterModel">Model</span>
            <span class="material-symbols-outlined" aria-hidden="true">expand_more</span>
          </button>
          <div class="filter-body">
            <label class="filter-option"><input class="filter-check" data-filter="model" value="4300"
                type="checkbox" /><span>4300</span></label>
            <label class="filter-option"><input class="filter-check" data-filter="model" value="Accord"
                type="checkbox" /><span>Accord</span></label>
            <label class="filter-option"><input class="filter-check" data-filter="model" value="Sonic"
                type="checkbox" /><span>Sonic</span></label>
            <label class="filter-option"><input class="filter-check" data-filter="model" value="Charger"
                type="checkbox" /><span>Charger</span></label>
            <label class="filter-option"><input class="filter-check" data-filter="model" value="4Runner"
                type="checkbox" /><span>4Runner</span></label>
            <label class="filter-option"><input class="filter-check" data-filter="model" value="Explorer"
                type="checkbox" /><span>Explorer</span></label>
            <label class="filter-option"><input class="filter-check" data-filter="model" value="Optima"
                type="checkbox" /><span>Optima</span></label>
          </div>
        </div>

        <div class="filter-block">
          <button class="filter-head" type="button">
            <span data-i18n="inventory.filterBody">Body</span>
            <span class="material-symbols-outlined" aria-hidden="true">expand_more</span>
          </button>
          <div class="filter-body">
            <label class="filter-option"><input class="filter-check" data-filter="body" value="Truck"
                type="checkbox" /><span>Truck</span></label>
            <label class="filter-option"><input class="filter-check" data-filter="body" value="SUV"
                type="checkbox" /><span>SUV</span></label>
            <label class="filter-option"><input class="filter-check" data-filter="body" value="Sedan"
                type="checkbox" /><span>Sedan</span></label>
          </div>
        </div>

        <div class="filter-block">
          <button class="filter-head" type="button">
            <span data-i18n="inventory.filterYear">Year</span>
            <span class="material-symbols-outlined" aria-hidden="true">expand_more</span>
          </button>
          <div class="filter-body">
            <div class="filter-input-row">
              <select id="yearFrom">
                <option value="" data-i18n="inventory.yearFrom">From</option>
                <option value="2015">2015</option>
                <option value="2016">2016</option>
                <option value="2018">2018</option>
                <option value="2019">2019</option>
              </select>
              <select id="yearTo">
                <option value="" data-i18n="inventory.yearTo">To</option>
                <option value="2015">2015</option>
                <option value="2016">2016</option>
                <option value="2018">2018</option>
                <option value="2019">2019</option>
              </select>
            </div>
          </div>
        </div>

        <div class="filter-block">
          <button class="filter-head" type="button">
            <span data-i18n="inventory.filterPrice">Price</span>
            <span class="material-symbols-outlined" aria-hidden="true">expand_more</span>
          </button>
          <div class="filter-body">
            <div class="filter-input-row">
              <input id="priceMin" type="number" placeholder="Min" data-i18n-placeholder="inventory.min" />
              <input id="priceMax" type="number" placeholder="Max" data-i18n-placeholder="inventory.max" />
            </div>
          </div>
        </div>

        <div class="filter-block">
          <button class="filter-head" type="button">
            <span data-i18n="inventory.filterMileage">Mileage</span>
            <span class="material-symbols-outlined" aria-hidden="true">expand_more</span>
          </button>
          <div class="filter-body">
            <div class="filter-input-row">
              <input id="mileageMin" type="number" placeholder="Min" data-i18n-placeholder="inventory.min" />
              <input id="mileageMax" type="number" placeholder="Max" data-i18n-placeholder="inventory.max" />
            </div>
          </div>
        </div>

        <div class="filter-block">
          <button class="filter-head" type="button">
            <span data-i18n="inventory.filterFuelType">Fuel Type</span>
            <span class="material-symbols-outlined" aria-hidden="true">expand_more</span>
          </button>
          <div class="filter-body">
            <label class="filter-option"><input class="filter-check" data-filter="fuel" value="Diesel"
                type="checkbox" /><span data-i18n="inventory.fuelDiesel">Diesel</span></label>
            <label class="filter-option"><input class="filter-check" data-filter="fuel" value="Gasolina"
                type="checkbox" /><span data-i18n="inventory.fuelGasoline">Gasoline</span></label>
          </div>
        </div>

        <button id="clearFiltersBtn" class="clear-filters-btn" type="button" data-i18n="inventory.clearFilters">Clear
          filters</button>
      </div>
    </aside>

    <section class="inventory-results w-full md:flex-1">
      <div class="inventory-toolbar">
        <div class="inventory-segments">
          <button class="segment-btn is-active" data-segment="all" type="button" data-i18n="inventory.segmentAll">All
            Vehicles</button>
          <button class="segment-btn" data-segment="truck" type="button"
            data-i18n="inventory.segmentCommercial">Commercial Vehicles</button>
          <button class="segment-btn" data-segment="passenger" type="button"
            data-i18n="inventory.segmentPassenger">Passenger Vehicles</button>
        </div>

        <div class="view-switch">
          <button id="viewGridBtn" class="view-btn is-active" type="button" aria-label="Grid view" title="Grid view"
            data-i18n-aria-label="inventory.gridViewAria" data-i18n-title="inventory.gridViewTitle">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect x="3" y="3" width="7" height="7" rx="1.2" />
              <rect x="14" y="3" width="7" height="7" rx="1.2" />
              <rect x="3" y="14" width="7" height="7" rx="1.2" />
              <rect x="14" y="14" width="7" height="7" rx="1.2" />
              <rect class="icon-accent" x="5.2" y="5.2" width="2.6" height="2.6" rx="0.4" />
              <rect class="icon-accent" x="16.2" y="5.2" width="2.6" height="2.6" rx="0.4" />
              <rect class="icon-accent" x="5.2" y="16.2" width="2.6" height="2.6" rx="0.4" />
              <rect class="icon-accent" x="16.2" y="16.2" width="2.6" height="2.6" rx="0.4" />
            </svg>
          </button>
          <button id="viewListBtn" class="view-btn" type="button" aria-label="List view" title="List view"
            data-i18n-aria-label="inventory.listViewAria" data-i18n-title="inventory.listViewTitle">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect x="3" y="4" width="3.5" height="3.5" rx="0.6" />
              <rect x="3" y="10.25" width="3.5" height="3.5" rx="0.6" />
              <rect x="3" y="16.5" width="3.5" height="3.5" rx="0.6" />
              <line x1="9.2" y1="5.75" x2="21" y2="5.75" />
              <line x1="9.2" y1="12" x2="21" y2="12" />
              <line x1="9.2" y1="18.25" x2="21" y2="18.25" />
            </svg>
          </button>
        </div>
      </div>

      <div class="inventory-summary">
        <span id="resultsCount">0 resultados</span>
      </div>

      <div id="inventoryCards" class="inventory-cards"></div>
      <nav id="inventoryPagination" class="inventory-pagination" hidden></nav>
      <p id="noResults" class="inventory-empty" hidden data-i18n="inventory.noResults">No vehicles found with those
        filters.</p>
    </section>
  </main>
  <site-footer></site-footer>

  <script src="i18n.js"></script>
  <script type="module" src="components/site-navbar.js"></script>
  <script type="module" src="components/site-footer.js"></script>
  <script src="vehicles-data.js"></script>
  <script src="inventory.js"></script>
</body>
