<!doctype html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>

<body style="margin:0;padding:0;background:#edf3fb;font-family:Arial,Helvetica,sans-serif;color:#1a2f4d;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0"
        style="background:#edf3fb;padding:28px 10px;">
        <tr>
            <td align="center">
                <table role="presentation" width="700" cellspacing="0" cellpadding="0"
                    style="max-width:700px;width:100%;background:#ffffff;border:1px solid #d4e0f2;border-radius:18px;overflow:hidden;box-shadow:0 12px 30px rgba(27,51,90,.12);">
                    <tr>
                        <td
                            style="background:linear-gradient(180deg,#727d8a 0%,#596472 100%);padding:14px 22px;color:#ffffff;">
                            <table role="presentation" width="100%" cellspacing="0" cellpadding="0">
                                <tr>
                                    <td style="font-size:20px;font-weight:700;letter-spacing:.2px;">Auto Limited</td>
                                    <td align="right"
                                        style="font-size:12px;opacity:.94;letter-spacing:.9px;text-transform:uppercase;">
                                        Contact Request</td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/dd/Ford_F-150_%28fourteenth_generation%29_Rutesheimer_Autoschau_2025_DSC_9231.jpg/1280px-Ford_F-150_%28fourteenth_generation%29_Rutesheimer_Autoschau_2025_DSC_9231.jpg"
                                alt="Ford F-150" style="display:block;width:100%;height:240px;object-fit:cover;" />
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:20px 24px 14px;background:#ffffff;border-top:4px solid #2f8ee8;">
                            <h1 style="margin:0;font-size:23px;line-height:1.2;color:#1f4f88;">{{subject}}</h1>
                            <p style="margin:7px 0 0;font-size:13px;color:#60738f;">Nueva solicitud recibida desde el
                                formulario Contact Us.</p>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:0 24px 28px;">
                            <table role="presentation" width="100%" cellspacing="0" cellpadding="0"
                                style="border-collapse:separate;border-spacing:12px 14px;">
                                <tr>
                                    <td
                                        style="padding:15px 16px;background:#f4f8ff;border:1px solid #dde7f8;border-radius:12px;font-size:12px;color:#5f728f;width:200px;text-transform:uppercase;letter-spacing:.55px;">
                                        Full Name</td>
                                    <td
                                        style="padding:15px 16px;background:#f4f8ff;border:1px solid #dde7f8;border-radius:12px;font-size:16px;font-weight:700;color:#17385f;">
                                        {{full_name}}</td>
                                </tr>
                                <tr>
                                    <td
                                        style="padding:15px 16px;background:#f4f8ff;border:1px solid #dde7f8;border-radius:12px;font-size:12px;color:#5f728f;text-transform:uppercase;letter-spacing:.55px;">
                                        Phone</td>
                                    <td
                                        style="padding:15px 16px;background:#f4f8ff;border:1px solid #dde7f8;border-radius:12px;font-size:16px;font-weight:700;color:#17385f;">
                                        {{phone}}</td>
                                </tr>
                                <tr>
                                    <td
                                        style="padding:15px 16px;background:#f4f8ff;border:1px solid #dde7f8;border-radius:12px;font-size:12px;color:#5f728f;text-transform:uppercase;letter-spacing:.55px;">
                                        Email</td>
                                    <td
                                        style="padding:15px 16px;background:#f4f8ff;border:1px solid #dde7f8;border-radius:12px;font-size:16px;font-weight:700;color:#17385f;">
                                        {{email}}</td>
                                </tr>
                                <tr>
                                    <td
                                        style="padding:15px 16px;background:#f4f8ff;border:1px solid #dde7f8;border-radius:12px;font-size:12px;color:#5f728f;text-transform:uppercase;letter-spacing:.55px;">
                                        Preferred Time</td>
                                    <td
                                        style="padding:15px 16px;background:#f4f8ff;border:1px solid #dde7f8;border-radius:12px;font-size:16px;font-weight:700;color:#17385f;">
                                        {{preferred_time}}</td>
                                </tr>
                                <tr>
                                    <td
                                        style="padding:15px 16px;background:#f4f8ff;border:1px solid #dde7f8;border-radius:12px;font-size:12px;color:#5f728f;text-transform:uppercase;letter-spacing:.55px;">
                                        Vehicle Interest</td>
                                    <td
                                        style="padding:15px 16px;background:#f4f8ff;border:1px solid #dde7f8;border-radius:12px;font-size:16px;font-weight:700;color:#17385f;">
                                        {{vehicle_interest}}</td>
                                </tr>
                            </table>
                            <table role="presentation" width="100%" cellspacing="0" cellpadding="0"
                                style="margin-top:14px;">
                                <tr>
                                    <td style="font-size:12px;color:#6b7a91;">Submitted: {{submitted_at}}</td>
                                    <td align="right" style="font-size:12px;color:#6b7a91;">Reply-To: {{email}}</td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>

</html>
